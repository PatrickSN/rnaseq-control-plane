[project]
name = "rnaseq-contracts"
version = "0.1.0"
description = "Shared schemas for rnaseq-control-plane"
requires-python = ">=3.11"
dependencies = ["pydantic[email]>=2.7"]

[build-system]
requires = ["setuptools>=69", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["."]
include = ["rnaseq_contracts*"]

